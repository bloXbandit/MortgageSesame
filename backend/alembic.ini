# Alembic configuration — MortgageSesame backend
# Run from the /backend directory:
#   alembic upgrade head        ← apply all migrations
#   alembic revision --autogenerate -m "describe change"  ← create new migration
#   alembic downgrade -1        ← roll back one step

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///./mortgagesesame.db

# For PostgreSQL production, override via env:
# export SQLALCHEMY_URL="postgresql+asyncpg://user:pass@host/db"
# or set DATABASE_URL in .env — env.py reads it automatically

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
